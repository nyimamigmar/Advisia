name: Tägliche Zefix-Prüfung Bezirk Muri

on:
  schedule:
    # 07:15 UTC = 08:15 MEZ (Winter) / 09:15 MESZ (Sommer)
    - cron: "15 7 * * 1-5"
  workflow_dispatch:
    inputs:
      reset_state:
        description: "Statusdatei zurücksetzen (neuer Erstlauf)"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: write

jobs:
  check-new-companies:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Statusdatei zurücksetzen (falls angefordert)
        if: ${{ inputs.reset_state == 'true' }}
        run: rm -f data/seen_companies.json

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt

      - name: Zefix-Prüfung durchführen & Tagesbericht senden
        run: python src/main.py
        env:
          # Absender-Daten (Repository Variables → Settings → Variables → Actions)
          SENDER_COMPANY:  ${{ vars.SENDER_COMPANY }}
          SENDER_NAME:     ${{ vars.SENDER_NAME }}
          SENDER_ADDRESS:  ${{ vars.SENDER_ADDRESS }}
          SENDER_ZIP_CITY: ${{ vars.SENDER_ZIP_CITY }}
          SENDER_PHONE:    ${{ vars.SENDER_PHONE }}
          SENDER_EMAIL:    ${{ vars.SENDER_EMAIL }}
          SENDER_WEBSITE:  ${{ vars.SENDER_WEBSITE }}
          # E-Mail-Versand (Repository Secrets → Settings → Secrets → Actions)
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

      - name: Generierte Briefe als Artefakt speichern
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: briefe-${{ github.run_id }}
          path: letters/
          retention-days: 90
          if-no-files-found: ignore

      - name: Statusdatei committen und pushen
        run: |
          git config user.name  "Zefix Bot"
          git config user.email "zefix-bot@users.noreply.github.com"
          git add data/seen_companies.json
          git diff --staged --quiet || \
            git commit -m "Zefix-Check $(date '+%Y-%m-%d'): Statusdatei aktualisiert"
          git push origin ${{ github.ref_name }}
